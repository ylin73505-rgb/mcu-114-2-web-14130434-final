<img [src]="photoUrl" />
<div class="content">
  <strong>{{ id }}. {{ productName }}</strong>
  <span>{{ createDate | date: 'yyyy-MM-dd' }}</span>
</div>
<div>{{ author }}</div>
<div class="company">
  <span>{{ company }}</span>
  <span>$1,580.00</span>
</div>
<div class="button">
  <button type="button">明細</button>
  <button type="button" class="remove">加入購物車</button>
</div>
