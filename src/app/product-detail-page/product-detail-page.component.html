<img [src]="product().photoUrl" />
<section>
  <h2>{{ product().name }}</h2>
  <div>
    <strong>作者</strong>
    <span>{{ product().authors }}</span>
  </div>
  <div>
    <strong>公司</strong>
    <span>{{ product().company }}</span>
  </div>
  <div>
    <strong>價格</strong>
    <span>{{ product().price | currency : '$' : 'symbol' : '4.0' }}</span>
  </div>
  <div class="button">
    <button type="button" (click)="onBack()">返回</button>
    <span>
      <button type="button" class="remove" (click)="onAddToCart()">加入購物車</button>
    </span>
  </div>
</section>
